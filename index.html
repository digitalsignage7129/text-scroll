<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現場用 流れる文字サイネージ（URL生成機能付き）</title>
    <style>
        /* 全体設定：焼き付き防止のため黒背景 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* -------------------------------------------
           1. URL生成・管理画面（文字が含まれない時だけ表示）
        ------------------------------------------- */
        .admin-screen {
            background: #111;
            border: 1px solid #333;
            padding: 30px;
            width: 600px;
            box-sizing: border-box;
            border-radius: 8px;
            display: none; /* 初期は非表示、JSで制御 */
        }
        .admin-screen h2 {
            margin-top: 0;
            font-size: 20px;
            border-bottom: 2px solid #0088ff;
            padding-bottom: 8px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
        }
        .form-group input[type="text"] {
            width: 100%;
            font-size: 16px;
            padding: 10px;
            box-sizing: border-box;
            background: #fff;
            border: 1px solid #ccc;
            color: #000;
        }
        .form-group select {
            width: 100%;
            font-size: 16px;
            padding: 10px;
            background: #fff;
            color: #000;
        }
        .gen-btn {
            width: 100%;
            font-size: 18px;
            padding: 12px;
            background: #0088ff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }
        .result-area {
            margin-top: 25px;
            padding: 15px;
            background: #222;
            border: 1px dashed #555;
            display: none;
        }
        .result-url {
            word-break: break-all;
            background: #000;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            color: #00ffcc;
            margin-bottom: 10px;
            border: 1px solid #333;
        }
        .copy-btn {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
        }

        /* -------------------------------------------
           2. サイネージ表示エリア（w700px * h100px 固定）
        ------------------------------------------- */
        .signage-wrapper {
            width: 700px;
            height: 100px;
            background-color: #000000;
            overflow: hidden;
            position: relative;
            box-sizing: border-box;
            display: none; /* 初期は非表示、JSで制御 */
        }

        /* 文字が流れるレーン */
        .marquee-track {
            position: absolute;
            white-space: nowrap;
            height: 100px;
            display: flex;
            align-items: center;
            will-change: transform;
        }

        /* 流れる文字本体（視認性最優先） */
        .marquee-content {
            font-size: 85px;
            font-weight: 900;
            line-height: 1;
            padding-right: 700px; /* ループ用余白 */
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="admin-screen" id="adminScreen">
        <h2>工事現場サイネージ URL生成ツール</h2>
        <div class="form-group">
            <label for="textInput">流したい文字</label>
            <input type="text" id="textInput" value="【安全第一】 本日の作業予定：足場解体工事（午前中） 通行時にはご注意ください。">
        </div>
        <div class="form-group">
            <label for="speedSelect">流れる速度</label>
            <select id="speedSelect">
                <option value="1.5">遅め</option>
                <option value="2.5" selected>標準</option>
                <option value="3.5">速め</option>
                <option value="5.0">超速め</option>
            </select>
        </div>
        <button class="gen-btn" onclick="generateURL()">専用URLを発行する</button>

        <div class="result-area" id="resultArea">
            <label>▼ サイネージ端末に登録するURL</label>
            <div class="result-url" id="resultUrl"></div>
            <button class="copy-btn" onclick="copyURL()">URLをコピー</button>
            <p style="font-size:12px; color:#aaa; margin-top:10px; margin-bottom:0;">※このURLにアクセスすると、入力した文字が全画面（700x100）で流れます。</p>
        </div>
    </div>

    <div class="signage-wrapper" id="signageWrapper">
        <div class="marquee-track" id="marqueeTrack"></div>
    </div>

    <script>
        // URLのパラメータ（?text=xxx&speed=yyy）を取得
        const urlParams = new URLSearchParams(window.location.search);
        const textParam = urlParams.get('text');
        const speedParam = urlParams.get('speed') || '2.5'; // デフォルト速度

        const adminScreen = document.getElementById('adminScreen');
        const signageWrapper = document.getElementById('signageWrapper');
        const track = document.getElementById('marqueeTrack');

        let animationFrameId = null;
        let currentX = 0;
        let speed = parseFloat(speedParam);

        // 挙動の分岐：URLに文字データがあるかないか
        if (textParam) {
            // 【サイネージモード】
            // 文字が指定されているので、管理画面は隠してサイネージだけを表示
            signageWrapper.style.display = 'block';
            startSignage(decodeURIComponent(textParam));
        } else {
            // 【設定モード】
            // 文字がないので、URLを作るための管理画面を表示
            adminScreen.style.display = 'block';
        }

        // URLを生成する関数
        function generateURL() {
            const textValue = document.getElementById('textInput').value.trim();
            const speedValue = document.getElementById('speedSelect').value;

            if (!textValue) {
                alert('文字を入力してください');
                return;
            }

            // ベースとなる現在のURLを取得（?以降を削る）
            const baseUrl = window.location.origin + window.location.pathname;
            
            // パラメータを付与したURLを組み立てる
            const generatedUrl = `${baseUrl}?text=${encodeURIComponent(textValue)}&speed=${speedValue}`;

            // 結果を表示
            document.getElementById('resultUrl').innerText = generatedUrl;
            document.getElementById('resultArea').style.display = 'block';
        }

        // URLコピー機能
        function copyURL() {
            const urlText = document.getElementById('resultUrl').innerText;
            navigator.clipboard.writeText(urlText).then(() => {
                alert('URLをコピーしました！サイネージ端末に設定してください。');
            });
        }

        // サイネージの再生を開始する関数
        function startSignage(text) {
            track.innerHTML = `
                <div class="marquee-content">${text}</div>
                <div class="marquee-content">${text}</div>
            `;

            requestAnimationFrame(() => {
                const firstChildWidth = track.children[0].offsetWidth;
                animate(firstChildWidth);
            });
        }

        // アニメーションループ
        function animate(loopWidth) {
            currentX -= speed;
            if (Math.abs(currentX) >= loopWidth) {
                currentX = 0;
            }
            track.style.transform = `translateX(${currentX}px)`;
            animationFrameId = requestAnimationFrame(() => animate(loopWidth));
        }
    </script>
</body>
</html>
